<!DOCTYPE html>
<html>
<head>
    <title>MoveWell - Тест упражнений</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        video, canvas { border: 1px solid #ccc; margin: 10px; }
        button { padding: 10px; margin: 5px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .good { background: #d4edda; color: #155724; }
        .needs_improvement { background: #fff3cd; color: #856404; }
        .poor { background: #f8d7da; color: #721c24; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>MoveWell - Тест упражнений</h1>
    
    <div>
        <label>Токен авторизации:</label>
        <input type="text" id="token" style="width: 400px" placeholder="jwt_token">
        <button onclick="connect()">Подключиться</button>
    </div>
    
    <div>
        <label>Упражнение:</label>
        <select id="exercise">
            <option value="squat">Приседания</option>
            <option value="pushup">Отжимания</option>
            <option value="plank">Планка</option>
        </select>
        <button onclick="startCamera()">Запустить камеру</button>
        <button onclick="startAnalysis()">Начать анализ</button>
        <button onclick="stopAnalysis()">Остановить</button>
    </div>
    
    <div>
        <video id="video" width="480" height="360" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
    
    <div id="result" class="result">Ожидание...</div>
    
    <script>
        let ws = null;
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let stream = null;
        let analysisInterval = null;
        
        function connect() {
            const token = document.getElementById('token').value;
            const exercise = document.getElementById('exercise').value;
            
            if (!token) {
                alert('Введите токен');
                return;
            }
            
            ws = new WebSocket(`ws://localhost:8000/ws/analyze/${exercise}`);
            
            ws.onopen = () => {
                document.getElementById('result').innerHTML = 'Подключено к серверу';
                ws.send(JSON.stringify({ token: token }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <strong>Статус:</strong> ${data.status}<br>
                    <strong>Оценка:</strong> ${data.score}%<br>
                    <strong>Фидбек:</strong> ${data.feedback}<br>
                    <strong>Точек обнаружено:</strong> ${data.joints_detected}<br>
                    <strong>Ошибки:</strong><br>
                    ${data.errors.map(e => `&nbsp;&nbsp;- ${e.error}`).join('<br>') || 'нет'}
                `;
                resultDiv.className = `result ${data.status}`;
            };
            
            ws.onclose = () => {
                document.getElementById('result').innerHTML = 'Соединение закрыто';
            };
        }
        
        async function startCamera() {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await video.play();
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }
        
        function startAnalysis() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Подключитесь к серверу');
                return;
            }
            
            analysisInterval = setInterval(() => {
                if (video.videoWidth > 0) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = canvas.toDataURL('image/jpeg', 0.7);
                    const base64Image = imageData.split(',')[1];
                    
                    ws.send(JSON.stringify({ image: base64Image }));
                }
            }, 1000);
        }
        
        function stopAnalysis() {
            if (analysisInterval) {
                clearInterval(analysisInterval);
                analysisInterval = null;
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            if (ws) {
                ws.close();
            }
        }
    </script>
</body>
</html>
